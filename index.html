<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コンテナ積載シミュレーター </title>
    <style>
        :root {
            --primary: #3b82f6; --accent: #10b981; --danger: #ef4444;
            --bg: #0f172a; --panel: rgba(30, 41, 59, 0.95); --text: #f8fafc;
        }
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
        .panel { pointer-events: auto; background: var(--panel); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-icon { flex: 1; background: #334155; border: none; color: white; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 18px; }
        .btn-icon:disabled { opacity: 0.2; }
        .filter-btn { flex: 1; background: #1e293b; color: #94a3b8; border: 1px solid #334155; padding: 8px; border-radius: 6px; font-size: 10px; cursor: pointer; font-weight: bold; }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(16, 185, 129, 0.1); }
        #edit-panel { display: none; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px solid var(--primary); }
        .inp-g { margin-bottom: 8px; }
        .inp-g label { display: block; font-size: 10px; opacity: 0.6; margin-bottom: 2px; }
        .inp-g input { width: 100%; background: #000; border: 1px solid #334155; border-radius: 4px; padding: 6px; color: var(--accent); font-weight: bold; box-sizing: border-box; }
        .check-g { display: flex; align-items: center; gap: 8px; font-size: 11px; margin: 10px 0; color: var(--accent); font-weight: bold; }
        .controls-bottom { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; pointer-events: auto; }
        button.main { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 12px; }
        button.mode-toggle { background: #1e293b; color: white; border: 2px solid transparent; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 11px; }
        button.mode-toggle.active { border-color: #f59e0b; color: #f59e0b; }
        .alert { background: var(--danger); color: white; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: bold; text-align: center; margin-top: 10px; display: none; border: 1px solid #fff; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="panel">
        <div style="color:var(--accent); font-weight:800; margin-bottom:10px;">CONTAINER SIMULATOR</div>
        <div class="btn-row">
            <button class="btn-icon" onclick="undo()">⤺</button>
            <button class="btn-icon" onclick="redo()">⤻</button>
        </div>
        <div class="btn-row">
            <button id="f1" class="filter-btn active" onclick="toggleLayer('Piso')">下段表示</button>
            <button id="f2" class="filter-btn active" onclick="toggleLayer('Topo')">上段表示</button>
        </div>
        <button id="btnMode" class="mode-toggle" onclick="toggleMoveMode()">↔️ 水平移動モード</button>
        <button class="filter-btn" style="width:100%; margin-top:10px; height: 35px; color: #00e5ff;" onclick="toggleDim()">📏 寸法線を表示 (CAD)</button>

        <div id="edit-panel">
            <div class="inp-g"><label>車両名</label><input type="text" id="iN"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px;">
                <div class="inp-g"><label>長(cm)</label><input type="number" id="iC"></div>
                <div class="inp-g"><label>幅(cm)</label><input type="number" id="iL"></div>
                <div class="inp-g"><label>高(cm)</label><input type="number" id="iA"></div>
            </div>
            <div class="check-g">
                <input type="checkbox" id="iWood" checked> <label for="iWood">木枠を適用 (側面10cm)</label>
            </div>
            <button class="main" style="width:100%; background:var(--accent);" onclick="saveEdit()">設定を適用</button>
        </div>
        <div id="alert" class="alert">⚠️ 積載警告: 接触または範囲外</div>
    </div>

    <div class="controls-bottom">
        <div class="btn-group">
            <button class="main" style="background:var(--accent)" onclick="addVehicle('Piso')">+ 下段追加</button>
            <button class="main" style="background:var(--primary)" onclick="addVehicle('Topo')">+ 上段追加</button>
        </div>
        <div class="btn-group">
            <button class="main" style="background:#475569" onclick="showEdit()">⚙️ 編集</button>
            <button class="main" style="background:#d97706" onclick="copyVehicle()">📋 コピー</button>
            <button class="main" style="background:#6366f1" onclick="rotate()">↻ 回転</button>
            <button class="filter-btn" style="background:#0f172a" onclick="exportData()">💾 出力</button>
        </div>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const C_C = 5.90, C_L = 2.35, C_A = 2.39;
    const FRAME = 0.10; // 10cm fixo

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(11, 9, 11);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const light = new THREE.PointLight(0xffffff, 100); light.position.set(5, 8, 5); scene.add(light);

    // Estrutura
    const vigas = new THREE.Group();
    const beamMat = new THREE.MeshStandardMaterial({ color: 0x64748b, metalness: 0.8 });
    const addB = (w,h,d,x,y,z) => { const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), beamMat); m.position.set(x,y,z); vigas.add(m); }
    const bt = 0.06;
    addB(bt, C_A, bt, 0, C_A/2, -C_L/2); addB(bt, C_A, bt, 0, C_A/2, C_L/2); addB(bt, C_A, bt, C_C, C_A/2, -C_L/2); addB(bt, C_A, bt, C_C, C_A/2, C_L/2);
    addB(C_C, bt, bt, C_C/2, 0, -C_L/2); addB(C_C, bt, bt, C_C/2, 0, C_L/2); addB(C_C, bt, bt, C_C/2, C_A, -C_L/2); addB(C_C, bt, bt, C_C/2, C_A, C_L/2);
    addB(bt, bt, C_L, 0, 0, 0); addB(bt, bt, C_L, C_C, 0, 0); addB(bt, bt, C_L, 0, C_A, 0); addB(bt, bt, C_L, C_C, C_A, 0);
    scene.add(vigas);

    const vehicles = [];
    const gDim = new THREE.Group(); scene.add(gDim);
    let showDim = false, moveY = false, vis1 = true, vis2 = true;

    // --- FUNÇÕES DE TEXTO E COTAS ---
    function genLabel(txt, cor = '#10b981') {
        const can = document.createElement('canvas'); const ctx = can.getContext('2d');
        can.width = 512; can.height = 128; ctx.fillStyle = cor; ctx.fillRect(0,0,512,128);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 50px sans-serif'; ctx.textAlign='center'; ctx.fillText(txt, 256, 80);
        return new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(can), transparent: true });
    }

    function addLine(p1, p2, txt, cor = 0xffffff) {
        const g = new THREE.Group();
        // depthTest: false FAZ A LINHA E O TEXTO APARECEREM POR CIMA DE TUDO!
        const matLine = new THREE.LineBasicMaterial({ color: cor, depthTest: false, transparent: true });
        g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([p1, p2]), matLine));
        
        const can = document.createElement('canvas'); const ctx = can.getContext('2d');
        can.width = 256; can.height = 128; 
        ctx.fillStyle = (cor === 0x00e5ff) ? '#00e5ff' : '#ffb700'; 
        ctx.font = 'bold 45px sans-serif'; ctx.textAlign='center'; ctx.fillText(txt, 128, 75);
        
        const sprMat = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(can), depthTest: false, transparent: true });
        const spr = new THREE.Sprite(sprMat);
        spr.position.copy(p1).lerp(p2, 0.5); 
        
        // Empurra o texto um pouco para não ficar em cima da linha
        if (Math.abs(p1.y - p2.y) > 0.1) spr.position.x += 0.4; 
        else spr.position.y += 0.2;
        
        spr.scale.set(1.2, 0.6, 1); g.add(spr); return g;
    }

    window.updateDim = () => {
        gDim.clear(); if (!showDim) return;
        // Container
        gDim.add(addLine(new THREE.Vector3(0,-0.8, C_L/2+0.8), new THREE.Vector3(C_C,-0.8, C_L/2+0.8), "12.192m", 0x00e5ff));
        gDim.add(addLine(new THREE.Vector3(-0.6, 0, -C_L/2-0.6), new THREE.Vector3(-0.6, C_A, -C_L/2-0.6), "2.59m", 0x00e5ff));
        
        // Tratores
        vehicles.forEach(v => {
            if (!v.visible) return;
            const {w, h, d} = v.userData.dim; const p = v.position;
            const mw = w/100, mh = h/100, md = d/100;
            
            const bM = (v.userData.useWood && v.userData.layer === 'Piso') ? FRAME : 0;
            const tM = (v.userData.useWood && v.userData.layer === 'Piso') ? FRAME : 0;
            const sM = (v.userData.useWood) ? FRAME : 0;
            
            const topY = p.y + mh + bM + tM;

            // X (Comprimento) - Flutuando em cima
            gDim.add(addLine(new THREE.Vector3(p.x-mw/2, topY + 0.2, p.z), new THREE.Vector3(p.x+mw/2, topY + 0.2, p.z), mw.toFixed(2)+"m", 0xffb700));
            // Y (Altura) - Lateral Esquerda/Frente
            gDim.add(addLine(new THREE.Vector3(p.x-mw/2-sM-0.1, p.y + bM, p.z+md/2+sM+0.1), new THREE.Vector3(p.x-mw/2-sM-0.1, p.y + bM + mh, p.z+md/2+sM+0.1), mh.toFixed(2)+"m", 0xffb700));
            // Z (Largura) - Base Frente
            gDim.add(addLine(new THREE.Vector3(p.x+mw/2+sM+0.1, p.y+bM, p.z-md/2), new THREE.Vector3(p.x+mw/2+sM+0.1, p.y+bM, p.z+md/2), md.toFixed(2)+"m", 0xffb700));
        });
    }

    window.toggleLayer = (layer) => {
        if (layer === 'Piso') vis1 = !vis1; else vis2 = !vis2;
        document.getElementById(layer === 'Piso' ? 'f1' : 'f2').classList.toggle('active');
        vehicles.forEach(v => { if(v.userData.layer === layer) v.visible = (layer === 'Piso' ? vis1 : vis2); });
        window.updateDim();
    }

    // --- CRIAÇÃO DO TRATOR E MADEIRAS ---
    function createV(layer, nome="車両", w_cm=175, h_cm=118, d_cm=115, useWood=true) {
        const g = new THREE.Group();
        const w = w_cm/100, h = h_cm/100, d = d_cm/100;
        
        // Regras: Piso tem madeira embaixo/cima. Topo só nas laterais.
        const bMargin = (useWood && layer === 'Piso') ? FRAME : 0;
        const tMargin = (useWood && layer === 'Piso') ? FRAME : 0;
        const sMargin = useWood ? FRAME : 0;

        const tractorMat = new THREE.MeshStandardMaterial({ color: layer === 'Piso' ? 0x10b981 : 0x3b82f6 });
        const tractor = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), tractorMat);
        tractor.position.y = h/2 + bMargin;
        g.add(tractor);

        let woodFrame = new THREE.Object3D();
        if (useWood) {
            const fW = w + sMargin*2, fH = h + bMargin + tMargin, fD = d + sMargin*2;
            const woodGeo = new THREE.BoxGeometry(fW, fH, fD);
            woodGeo.translate(0, fH/2, 0);
            woodFrame = new THREE.Mesh(woodGeo, new THREE.MeshBasicMaterial({ color: 0x8b4513, wireframe: true, opacity: 0.3, transparent: true }));
            g.add(woodFrame);
        }

        // ETIQUETAS EM 5 LADOS (Topo, Esq, Dir, Frente, Tras)
        const lMat = genLabel(nome, layer === 'Piso' ? '#10b981' : '#3b82f6');
        const labels = [];
        
        const geoW = new THREE.PlaneGeometry(w*0.8, 0.25);
        const geoD = new THREE.PlaneGeometry(d*0.8, 0.25);
        
        const addL = (geo, rx, ry, px, py, pz) => { 
            const l = new THREE.Mesh(geo, lMat); l.rotation.set(rx, ry, 0); l.position.set(px, py, pz); g.add(l); labels.push(l);
        }

        const topH = h + bMargin + tMargin;
        addL(geoW, -Math.PI/2, 0, 0, topH + 0.01, 0); // Topo
        addL(geoD, 0, 0, 0, topH/2, d/2 + sMargin + 0.01); // Lateral Esquerda
        addL(geoD, 0, Math.PI, 0, topH/2, -d/2 - sMargin - 0.01); // Lateral Direita
        addL(geoW, 0, Math.PI/2, w/2 + sMargin + 0.01, topH/2, 0); // Frente
        addL(geoW, 0, -Math.PI/2, -w/2 - sMargin - 0.01, topH/2, 0); // Trás

        g.userData = { layer, corOrig: tractorMat.color.getHex(), body: tractor, wood: woodFrame, useWood, dim: { w: w_cm, h: h_cm, d: d_cm }, nome };
        g.visible = (layer === 'Piso' ? vis1 : vis2);
        return g;
    }

    window.addVehicle = (l) => {
        const v = createV(l, "車両 " + (vehicles.length + 1));
        v.position.set(1.5, l === 'Topo' ? 1.20 : 0, 0);
        scene.add(v); vehicles.push(v); selecionado = v;
        window.updateDim(); checkCol(); saveState();
    }

    window.copyVehicle = () => {
        if (!selecionado) return;
        const d = selecionado.userData;
        const clone = createV(d.layer, d.nome + " (copy)", d.dim.w, d.dim.h, d.dim.d, d.useWood);
        clone.position.copy(selecionado.position); clone.position.x += 0.4;
        scene.add(clone); vehicles.push(clone); selecionado = clone;
        window.updateDim(); checkCol(); saveState();
    }

    window.showEdit = () => {
        if (!selecionado) return;
        document.getElementById('edit-panel').style.display = 'block';
        document.getElementById('iN').value = selecionado.userData.nome;
        document.getElementById('iC').value = selecionado.userData.dim.w;
        document.getElementById('iL').value = selecionado.userData.dim.d;
        document.getElementById('iA').value = selecionado.userData.dim.h;
        document.getElementById('iWood').checked = selecionado.userData.useWood;
    }

    window.saveEdit = () => {
        if (!selecionado) return;
        const n = document.getElementById('iN').value, w = parseFloat(document.getElementById('iC').value), d = parseFloat(document.getElementById('iL').value), h = parseFloat(document.getElementById('iA').value), wood = document.getElementById('iWood').checked;
        const pos = selecionado.position.clone(), rot = selecionado.rotation.clone(), lay = selecionado.userData.layer;
        scene.remove(selecionado); vehicles.splice(vehicles.indexOf(selecionado), 1);
        const novo = createV(lay, n, w, h, d, wood); novo.position.copy(pos); novo.rotation.copy(rot);
        scene.add(novo); vehicles.push(novo); selecionado = novo;
        window.updateDim(); checkCol(); saveState();
        document.getElementById('edit-panel').style.display = 'none';
    }

    // Interação
    let selecionado = null, dragging = false;
    const ray = new THREE.Raycaster(); const m = new THREE.Vector2();
    const pXZ = new THREE.Plane(new THREE.Vector3(0,1,0), 0); const pY = new THREE.Plane();
    const pI = new THREE.Vector3(), off = new THREE.Vector3();

    function onDown(e) {
        const x = e.touches ? e.touches[0].clientX : e.clientX, y = e.touches ? e.touches[0].clientY : e.clientY;
        m.x = (x/window.innerWidth)*2-1; m.y = -(y/window.innerHeight)*2+1;
        ray.setFromCamera(m, camera);
        const hits = ray.intersectObjects(vehicles.filter(v => v.visible), true);
        if (hits.length > 0) {
            controls.enabled = false; dragging = true;
            let t = hits[0].object; while(t.parent && !vehicles.includes(t)) t = t.parent;
            selecionado = t;
            if (moveY) {
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir); dir.y = 0;
                pY.setFromNormalAndCoplanarPoint(dir.normalize(), selecionado.position);
                if (ray.ray.intersectPlane(pY, pI)) off.copy(selecionado.position).sub(pI);
            } else {
                pXZ.setFromNormalAndCoplanarPoint(new THREE.Vector3(0,1,0), selecionado.position);
                if (ray.ray.intersectPlane(pXZ, pI)) off.copy(selecionado.position).sub(pI);
            }
            vehicles.forEach(v => v.userData.body.material.emissive.set(0x000000));
            selecionado.userData.body.material.emissive.set(0x1a1a1a);
        }
    }
    function onMove(e) {
        if (!dragging || !selecionado) return;
        const x = e.touches ? e.touches[0].clientX : e.clientX, y = e.touches ? e.touches[0].clientY : e.clientY;
        m.x = (x/window.innerWidth)*2-1; m.y = -(y/window.innerHeight)*2+1;
        ray.setFromCamera(m, camera);
        if (moveY) { if(ray.ray.intersectPlane(pY, pI)) selecionado.position.y = pI.y + off.y; }
        else { if(ray.ray.intersectPlane(pXZ, pI)) { selecionado.position.x = pI.x + off.x; selecionado.position.z = pI.z + off.z; } }
        window.updateDim(); checkCol();
    }
    function onUp() { if (dragging) saveState(); dragging = false; controls.enabled = true; }

    window.addEventListener('mousedown', onDown); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
    window.addEventListener('touchstart', onDown); window.addEventListener('touchmove', onMove); window.addEventListener('touchend', onUp);

    window.rotate = () => { if(selecionado) { selecionado.rotation.y += Math.PI/2; window.updateDim(); checkCol(); saveState(); } };
    window.toggleDim = () => { showDim = !showDim; window.updateDim(); };
    window.toggleMoveMode = () => { moveY = !moveY; document.getElementById('btnMode').innerHTML = moveY ? "↕️ 高さ調整モード" : "↔️ 水平移動モード"; document.getElementById('btnMode').classList.toggle('active'); };

    let history = [], hIdx = -1;
    function saveState() {
        if (hIdx < history.length - 1) history = history.slice(0, hIdx + 1);
        history.push(JSON.stringify(vehicles.map(t => ({ l: t.userData.layer, x: t.position.x, y: t.position.y, z: t.position.z, ry: t.rotation.y, d: t.userData.dim, n: t.userData.nome, w: t.userData.useWood }))));
        hIdx++; updateHist();
    }
    window.undo = () => { if (hIdx > 0) load(history[--hIdx]); updateHist(); };
    window.redo = () => { if (hIdx < history.length - 1) load(history[++hIdx]); updateHist(); };
    function updateHist() { document.querySelectorAll('.btn-icon')[0].disabled = hIdx <= 0; document.querySelectorAll('.btn-icon')[1].disabled = hIdx >= history.length - 1; }
    function load(s) {
        vehicles.forEach(t => scene.remove(t)); vehicles.length = 0;
        JSON.parse(s).forEach(d => {
            const t = createV(d.l, d.n, d.d.w, d.d.h, d.d.d, d.w);
            t.position.set(d.x, d.y, d.z); t.rotation.y = d.ry;
            scene.add(t); vehicles.push(t);
        });
        window.updateDim(); checkCol();
    }

    function checkCol() {
        let e = false;
        vehicles.forEach(t => {
            const b = new THREE.Box3().setFromObject(t.userData.useWood ? t.userData.wood : t.userData.body);
            let c = (b.min.x < -0.01 || b.max.x > C_C + 0.01 || b.min.z < -C_L/2 - 0.01 || b.max.z > C_L/2 + 0.01 || b.min.y < -0.01 || b.max.y > C_A + 0.01);
            vehicles.forEach(o => { if (t !== o && b.clone().expandByScalar(-0.01).intersectsBox(new THREE.Box3().setFromObject(o.userData.useWood ? o.userData.wood : o.userData.body))) c = true; });
            t.userData.body.material.color.set(c ? 0xef4444 : t.userData.corOrig); if (c) e = true;
        });
        document.getElementById('alert').style.display = e ? 'block' : 'none';
    }

    window.exportData = () => {
        let txt = "LOADING REPORT\n";
        vehicles.forEach((t, i) => txt += `${i+1}. ${t.userData.nome} | Dim: ${t.userData.dim.w}x${t.userData.dim.h}x${t.userData.dim.d}cm\n`);
        const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([txt], {type: 'text/plain'}));
        link.download = 'report.txt'; link.click();
    };

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
    animate();
    saveState();
</script>

</body>
</html>
